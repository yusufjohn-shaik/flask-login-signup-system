{% extends "base.html" %}

{% block content %}
<h2>Login</h2>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="username" placeholder="Username" value="{{ username if username else '' }}" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="/signup">Signup</a></p>
{% endblock %}
